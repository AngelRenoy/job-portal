{% extends 'base.html' %}

{% block content %}
<div class="container-fluid px-0">
    <div class="row g-0">
        {% include 'portal/admin_sidebar.html' %}

        <div class="col-md-10 py-5 px-5">
            <div class="mb-5">
                <a href="{% url 'admin_users' %}" class="text-muted text-decoration-none small fw-bold mb-2 d-inline-block">
                    <i class="fas fa-arrow-left me-1"></i> Back to Users
                </a>
                <h1 class="fw-bold h3 mb-1">Onboard New Recruiter</h1>
                <p class="text-muted">Manually create a recruiter account with verified credentials.</p>
            </div>

            <div class="premium-card p-5 col-lg-8 mx-auto">
                <form method="POST">
                    {% csrf_token %}
                    
                    <!-- Basic Info -->
                    <div class="mb-5">
                        <h6 class="text-primary fw-bold text-uppercase small mb-4">Basic Information</h6>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted">
                                        <i class="fas fa-user"></i>
                                    </span>
                                    <input type="text" name="username" class="form-control border-start-0" placeholder="e.g. johndoe" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted">
                                        <i class="fas fa-envelope"></i>
                                    </span>
                                    <input type="email" name="email" class="form-control border-start-0" placeholder="name@company.com" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Contact Info -->
                    <div class="mb-5">
                        <h6 class="text-primary fw-bold text-uppercase small mb-4">Contact Information</h6>
                        <div class="row">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Phone Number</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted">
                                        <i class="fas fa-phone"></i>
                                    </span>
                                    <input type="text" name="phone" class="form-control border-start-0" placeholder="+1 (555) 000-0000">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Security -->
                    <div class="mb-5">
                        <h6 class="text-primary fw-bold text-uppercase small mb-4">Account Security</h6>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted">
                                        <i class="fas fa-lock"></i>
                                    </span>
                                    <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Confirm Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted">
                                        <i class="fas fa-shield-alt"></i>
                                    </span>
                                    <input type="password" name="confirm_password" class="form-control border-start-0" placeholder="••••••••" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="text-end border-top pt-4">
                        <button type="submit" class="btn btn-primary px-5 py-2">
                            <i class="fas fa-user-plus me-2"></i> Create Recruiter Account
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .input-group-text {
        border-radius: 8px 0 0 8px;
    }
    .form-control {
        border-radius: 0 8px 8px 0 !important;
    }
</style>
{% endblock %}
