{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 shadow-sm">
                <h2 class="fw-bold mb-4">{{ title|default:"Job Details" }}</h2>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase text-muted">{{ field.label }}</label>
                        {{ field.errors }}
                        <div class="{% if field.name == 'required_skills' or field.name == 'skills' %}border rounded p-3 bg-light{% endif %}">
                            {{ field }}
                        </div>
                        {% if field.help_text %}
                            <div class="form-text small">{{ field.help_text }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Save Information</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
